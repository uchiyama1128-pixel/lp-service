services:
  - type: web
    name: lp-service
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: XSERVER_FTP_HOST
        value: sv14371.xserver.jp
      - key: XSERVER_FTP_USER
        value: lp-deploy@visionroom.jp
      - key: XSERVER_FTP_PASS
        sync: false
      - key: XSERVER_BASE_URL
        value: https://visionroom.jp/lp/
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: LINE_HARNESS_API_KEY
        sync: false
      - key: LINE_HARNESS_API_URL
        value: https://line-crm-worker.uchiyama1128.workers.dev
      - key: LIFF_URL
        value: https://liff.line.me/2009607643-QGWpmKya
